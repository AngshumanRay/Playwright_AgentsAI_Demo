# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  📖 USER STORY TEMPLATE                                                  ║
# ║  Copy this file and fill in YOUR details                                 ║
# ║  Then run:  npm run generate                                             ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# INSTRUCTIONS:
#   1. Copy this file:  cp _TEMPLATE.yaml US-XX-my-feature.yaml
#   2. Fill in ALL fields below (replace the placeholder values)
#   3. Run:  npm run generate
#   4. Review generated files, customize TODO items
#   5. Run:  npm test
#
# FILE NAMING: US-XX-short-description.yaml
#   Examples: US-06-checkout.yaml, US-07-profile.yaml, US-08-dashboard.yaml
#
# WHAT GETS GENERATED:
#   ┌──────────────────────────────────────────────────────────────────────┐
#   │  This YAML file                                                      │
#   │      │                                                               │
#   │      ├──→ TEST_CASES.md section (test case documentation)            │
#   │      ├──→ test-data/<dataFile>  (YAML test data for each test)       │
#   │      ├──→ tests/<testFile>      (Playwright test script)             │
#   │      └──→ pages/<pageObject>.ts (Page Object Model class)            │
#   └──────────────────────────────────────────────────────────────────────┘


# ─────────────────────────────────────────────────────────────────────────────
#  USER STORY METADATA
# ─────────────────────────────────────────────────────────────────────────────
storyId: "US-XX"                           # Unique ID (US-06, US-07, etc.)
title: "Your Feature Name"                 # Short title
description: "As a [role], I want to [action], so that [benefit]."
priority: "High"                           # Critical | High | Medium | Low
module: "Feature Area"                     # Module name (Login, Checkout, etc.)
baseUrl: "https://your-app.com"            # Target application URL
pagePath: "/your-page"                     # Starting page path

# ─────────────────────────────────────────────────────────────────────────────
#  OUTPUT CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
output:
  dataFile: "your-feature-tests.yaml"      # → test-data/your-feature-tests.yaml
  testFile: "your-feature.test.ts"         # → tests/your-feature.test.ts
  pageObject: "YourFeaturePage"            # → pages/YourFeaturePage.ts
  testGroup: "Your Feature Tests"          # test.describe('...')

# ─────────────────────────────────────────────────────────────────────────────
#  ACCEPTANCE CRITERIA → TEST CASES
# ─────────────────────────────────────────────────────────────────────────────
acceptanceCriteria:

  - id: "PROJ-XXX"                         # XRAY test case key
    tcId: "TCXX"                           # Test case number
    title: "Description of what to test"
    type: "positive"                       # positive | negative | boundary | smoke
    priority: "high"                       # critical | high | medium | low
    preconditions:
      - "User is logged in"
      - "Feature page is accessible"
    steps:
      - action: "Navigate to the feature page"
        expected: "Page loads with expected content"
      - action: "Click the main button"
        expected: "Action is performed"
      - action: "Verify the result is correct"
        expected: "Success message displayed"
    testData:
      field1: "value1"
      field2: "value2"
      expectedResult: "expected value"

  # Add more acceptance criteria below...
  # Each one becomes a separate test case.

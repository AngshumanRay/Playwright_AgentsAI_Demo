# ║  📖 SAMPLE USER STORY — US-05: Search Functionality                     ║
# ╠═══════════════════════════════════════════════════════════════════════════╣
# ║                                                                          ║
# ║  This file demonstrates how Business Analysts / Product Owners write     ║
# ║  User Stories in YAML format. The generator reads these files and        ║
# ║  automatically produces:                                                 ║
# ║    1. Test Cases (appended to TEST_CASES.md)                             ║
# ║    2. YAML test data (test-data/<dataFile>)                              ║
# ║    3. Test scripts (tests/<testFile>)                                    ║
# ║    4. Page objects (pages/<pageObject>.ts)                               ║
# ║                                                                          ║
# ║  HOW TO USE:                                                             ║
# ║    1. Copy this file as a template                                       ║
# ║    2. Fill in YOUR user story details                                    ║
# ║    3. Run:  npm run generate                                             ║
# ║    4. Review the generated files, customize as needed                    ║
# ║    5. Run:  npm test                                                     ║
# ║                                                                          ║
# ╚═══════════════════════════════════════════════════════════════════════════╝


# ─────────────────────────────────────────────────────────────────────────────
#  USER STORY METADATA
# ─────────────────────────────────────────────────────────────────────────────
storyId: "US-05"
title: "Search Functionality"
description: "As a user, I want to search for content on the website, so that I can quickly find relevant information without manually browsing."
priority: "High"
module: "Search"                    # Feature area / module name
baseUrl: "https://playwright.dev"   # Target application URL
pagePath: "/docs/intro"             # Starting page path

# ─────────────────────────────────────────────────────────────────────────────
#  OUTPUT CONFIGURATION — where generated files go
# ─────────────────────────────────────────────────────────────────────────────
output:
  dataFile: "search-tests.yaml"                # → test-data/search-tests.yaml
  testFile: "search.test.ts"                   # → tests/search.test.ts
  pageObject: "SearchPage"                     # → pages/SearchPage.ts
  testGroup: "Search Feature Tests"            # test.describe('...')

# ─────────────────────────────────────────────────────────────────────────────
#  ACCEPTANCE CRITERIA → TEST CASES
# ─────────────────────────────────────────────────────────────────────────────
#  Each acceptance criterion maps to ONE test case.
#  The generator creates: YAML data + test script + test case doc
#
#  FIELD REFERENCE:
#    id            — XRAY key (PROJ-XXX)
#    tcId          — Test case number (TC14, TC15, ...)
#    title         — Human-readable test name
#    type          — "positive" | "negative" | "boundary" | "smoke"
#    priority      — "critical" | "high" | "medium" | "low"
#    preconditions — What must be true BEFORE the test runs
#    steps         — Ordered list of actions + expected results
#    testData      — Key-value pairs used by the test script
# ─────────────────────────────────────────────────────────────────────────────
acceptanceCriteria:

  - id: "PROJ-201"
    tcId: "TC14"
    title: "Search for a valid keyword and verify results appear"
    type: "positive"
    priority: "high"
    preconditions:
      - "Website is accessible"
      - "Search functionality is available on the page"
    steps:
      - action: "Navigate to the documentation page"
        expected: "Docs page loads with search icon visible"
      - action: "Click the search icon / press Ctrl+K to open search"
        expected: "Search modal opens with input field focused"
      - action: "Type 'locator' into the search field"
        expected: "Search results appear showing matches"
      - action: "Verify at least one result contains the keyword"
        expected: "Results list has items matching 'locator'"
    testData:
      searchKeyword: "locator"
      expectedMinResults: 1
      expectedUrlFragment: "/docs"

  - id: "PROJ-202"
    tcId: "TC15"
    title: "Search for an empty string should show no results or prompt"
    type: "negative"
    priority: "medium"
    preconditions:
      - "Website is accessible"
      - "Search modal can be opened"
    steps:
      - action: "Navigate to the documentation page"
        expected: "Docs page loads"
      - action: "Open the search modal"
        expected: "Search modal opens"
      - action: "Submit search with empty input"
        expected: "No results shown or a helpful prompt is displayed"
    testData:
      searchKeyword: ""
      expectedMinResults: 0
      expectedUrlFragment: "/docs"

  - id: "PROJ-203"
    tcId: "TC16"
    title: "Search for a nonsense keyword should show no results"
    type: "negative"
    priority: "medium"
    preconditions:
      - "Website is accessible"
    steps:
      - action: "Navigate to the documentation page"
        expected: "Docs page loads"
      - action: "Open the search modal"
        expected: "Search modal opens"
      - action: "Type 'xyzzynonexistent99' into the search field"
        expected: "No results found message is displayed"
    testData:
      searchKeyword: "xyzzynonexistent99"
      expectedMinResults: 0
      expectedNoResultsMessage: "No results"
      expectedUrlFragment: "/docs"

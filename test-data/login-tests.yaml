# =============================================================================
# test-data/login-tests.yaml — TEST DATA FOR LOGIN FEATURE TESTS
# =============================================================================
# PURPOSE:
#   This file stores all test data for the Login test suite externally.
#   Tests read their inputs from this file instead of hardcoding values,
#   making the test data reusable, easy to update, and environment-portable.
#
# STRUCTURE:
#   Each top-level key is the XRAY test case ID (e.g., PROJ-101).
#   Under it:
#     testCase   → Friendly name shown in logs and reports
#     data       → Inputs the test uses (credentials, URLs, expected results)
#
# HOW TO ADD A NEW LOGIN TEST:
#   1. Add a new PROJ-XXX block below
#   2. Fill in the testCase name and data fields
#   3. In login.test.ts, reference it via: getTestData('PROJ-XXX')
#
# NOTE:
#   The demo site (the-internet.herokuapp.com/login) openly displays its
#   credentials on the page. In a real project, store secrets in .env and
#   reference them via ${ENV:VARIABLE_NAME} syntax (supported by the loader).
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# TC01 — Successful Login with Valid Credentials
# ─────────────────────────────────────────────────────────────────────────────
PROJ-101:
  testCase: "TC01: Valid credentials should log the user in successfully"
  data:
    username: "tomsmith"
    password: "SuperSecretPassword!"
    expectedUrlFragment: "/secure"
    expectedOutcome: "pass"
    description: "Valid login — user should be redirected to secure area"

# ─────────────────────────────────────────────────────────────────────────────
# TC02 — Login Should Fail with Wrong Password
# ─────────────────────────────────────────────────────────────────────────────
PROJ-102:
  testCase: "TC02: Wrong password should show an error message"
  data:
    username: "tomsmith"
    password: "WrongPassword"
    expectedErrorMessage: "Your password is invalid!"
    expectedUrlFragment: "/login"
    expectedOutcome: "error"
    description: "Invalid password — error message should be displayed"

# ─────────────────────────────────────────────────────────────────────────────
# TC03 — Login Should Fail with Empty Fields
# ─────────────────────────────────────────────────────────────────────────────
PROJ-103:
  testCase: "TC03: Empty credentials should show validation errors"
  data:
    username: ""
    password: ""
    expectedErrorMessage: "Your username is invalid!"
    expectedUrlFragment: "/login"
    expectedOutcome: "error"
    description: "Empty credentials — validation error should be shown"

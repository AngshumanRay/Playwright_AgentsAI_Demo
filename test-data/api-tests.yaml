# ─── US-102: Blog Posts API ──────────────────────────────────────────────────

US-102.AC-1:
  run: true
  tags: ["Smoke", "Regression"]
  storyId: "US-102"
  feature: "Blog Posts API"
  title: "GET single post returns valid response"
  baseUrl: "https://jsonplaceholder.typicode.com"
  endpoint: "/posts/1"
  method: "GET"
  expectedStatus: 200
  expectedFields: ["id", "userId", "title", "body"]

US-102.AC-2:
  run: true
  tags: ["Regression"]
  storyId: "US-102"
  feature: "Blog Posts API"
  title: "POST creates a new blog post"
  baseUrl: "https://jsonplaceholder.typicode.com"
  endpoint: "/posts"
  method: "POST"
  expectedStatus: 201
  payload:
    title: "Playwright AgentsAI Demo Test Post"
    body: "Created by automated test framework"
    userId: 1

US-102.AC-3:
  run: true
  tags: ["Sanity", "Regression"]
  storyId: "US-102"
  feature: "Blog Posts API"
  title: "GET user profile returns nested fields"
  baseUrl: "https://jsonplaceholder.typicode.com"
  endpoint: "/users/1"
  method: "GET"
  expectedStatus: 200
  expectedFields: ["id", "name", "email", "address", "company"]

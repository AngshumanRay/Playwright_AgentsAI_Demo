# =============================================================================
# test-data/navigation-tests.yaml — TEST DATA FOR PLAYWRIGHT.DEV NAVIGATION TESTS
# =============================================================================
# PURPOSE:
#   This file stores all test data for the Playwright.dev navigation suite.
#   Each test case has its tab/action, expected title, heading, and URL.
#
# STRUCTURE:
#   Each top-level key is the XRAY test case ID (e.g., PROJ-107).
#   Under it:
#     testCase  → Friendly name shown in logs and reports
#     data      → Navigation action, expected page title, heading, URL
#
# HOW TO ADD A NEW NAVIGATION TEST:
#   1. Add a new PROJ-XXX block below
#   2. Fill in the testCase name and navigation data
#   3. In playwright-dev.test.ts, reference it via: getTestData('PROJ-XXX')
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# TC07 — Navigate to Homepage and Verify Title
# ─────────────────────────────────────────────────────────────────────────────
PROJ-107:
  testCase: "TC07: Navigate to Homepage and verify Playwright title"
  data:
    action: "navigateHome"
    expectedTitle: "Playwright"
    expectedHeading: "Playwright enables reliable end-to-end testing"
    expectedUrl: "playwright.dev"
    description: "Open homepage and verify title, heading, and URL"

# ─────────────────────────────────────────────────────────────────────────────
# TC08 — Click Docs Tab and Verify Title
# ─────────────────────────────────────────────────────────────────────────────
PROJ-108:
  testCase: "TC08: Click Docs tab and verify Installation page title"
  data:
    action: "clickDocs"
    expectedTitle: "Installation"
    expectedHeading: "Installation"
    expectedUrl: "/docs/intro"
    description: "Click Docs tab and verify Installation page loads"

